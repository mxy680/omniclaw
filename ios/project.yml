name: AgentChat
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: 1
targets:
  AgentChat:
    type: application
    platform: iOS
    sources:
      - path: AgentChat
    settings:
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_CFBundleDisplayName: Omniclaw
      INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: true
    info:
      path: AgentChat/Info.plist
      properties:
        CFBundleDisplayName: Omniclaw
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: AgentChat needs camera access to take photos for your messages.
